<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>home</title>
  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <!-- tailwind & daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    * {
        
      font-family: "Geist", sans-serif;
    }

    .border-own {
      border: 1px solid white;
    
      box-shadow: 1px snow;
    }

  </style>

</head>

<body class="mx-auto w-11/12 pt-2.5 ">
  <main>

    <header class="bg-white ">
      <div class="flex justify-between">
        <div class="left flex items-center gap-1">
          <img src="./assets/github-logo.png" class=" mb-4 w-16" alt="">
          <h1 class="font-bold sm:text-[16px] text-2xl">GitHub Issues Tracker</h1>
        </div>
        <div class="right flex items-center gap-1">
          <div>
            <label class="input">
              <i class="fa-solid fa-magnifying-glass"></i>
              <input type="search" required placeholder="Search Issues..." />
            </label>
          </div>
          <button class="btn btn-active btn-primary">+ New Issue</button>

        </div>
      </div>

    </header>


    <section class="w-10/12 mx-auto h-[88px]  p-6 mt-16 mb-4 border">
      <div id="buttons">

        <div id="buttons">
          <button onclick="loadIssues(this)" id="all-btn" class="btn btn-primary">All</button>
          <button onclick="filterStatus('open',this)" id="open-btn" class="btn btn-outline">Open</button>
          <button onclick="filterStatus('closed',this)" id="closed-btn" class="btn btn-outline">Closed</button>
        </div>

    </section>


    <section class="w-10/12 mx-auto mt-4 bg-white">
      <div class="flex justify-between ">
        <div class="left-side flex gap-3">
          <img src="./assets/Aperture.png" alt="">
          <div>
            <h3 id="issue-count" class="font-bold text-2xl">0 issues</h3>
            <p class="text-gray-500 whitespace-nowrap">Track and manage your project issues</p>
          </div>
        </div>
        <div class="right-side flex gap-2">
          <div class="flex gap-1 text-center items-center">
            <p class="bg-green-600 rounded-full h-3 w-3"></p>
            <p>Open</p>
          </div>
          <div class="flex gap-1 text-center items-center">
            <p class="bg-purple-600 rounded-full h-3 w-3"></p>
            <p>Closed</p>
          </div>
        </div>
      </div>
    </section>


<div id="load-spinner" class="hidden text-center mt-6">
  <span class="loading loading-spinner loading-lg text-primary"></span>
</div>




    <section class="issue">
      <div id="issue-container" class="grid lg:grid-cols-4 md:grid-cols-3 sm:grid-cols-2 w-10/12 mx-auto gap-3 mt-6 items-stretch">

<!-- for backtik -->
      
      
      </div>

    </section>



  </main>

</body>
<script src="script.js"></script>
</html>
