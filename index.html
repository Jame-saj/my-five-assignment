<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Github Issues Tracker</title>

  <!-- font -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">

  <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" />

  <!-- tailwind & daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    * {

      font-family: "Geist", sans-serif;
    }

    .border-own {
      border: 1px solid wheat;
      box-shadow: 1px snow;
    }
  </style>

</head>

<body class="bg-base-200 min-h-screen  flex items-center justify-center">

  <main>

    <!-- main card -->
    <div class="w-[520px]  max-w-xl border-own rounded-2xl shadow-lg p-8">

      <!-- logo section -->
      <div class="text-center mb-6">
        <img src="./assets/github-logo.png" class="mx-auto mb-4 w-16" alt="">
        <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
        <p class="text-gray-400 text-[18px]">Sign in to manage your issues</p>
      </div>
      <!-- form -->
      <div>
        <fieldset class="space-y-3">

          <div>
            <label class="font-bold  text-[16px]">Username</label>
            <br>
            <input id="user-name" class="input w-full rounded-2xl bg-base-300 outline-none" value=""
              placeholder="Enter username">
            <p class="text-indigo-600">Default:admin</p>
          </div>


          <div>
            <label class="font-bold text-[16px]">Password</label>
            <br>
            <input id="input-pass" type="password" class="input w-full rounded-2xl bg-base-300 outline-none"
              value="" placeholder="Enter password">
            <p class="text-indigo-600">Default:admin123</p>
          </div>


          <button id="sign-btn" class="btn btn-primary w-full rounded-2xl mt-4">
            Sign In
          </button>

        </fieldset>
      </div>

      <div class="flex items-center my-6">
        <hr class="flex-1 text-gray-400 items-center my-5">
        <span class="px-2">OR</span>
        <hr class=" flex-1 text-gray-400 items-center my-5">
      </div>
      <div>
        <h1 class="text-center mb-2">Demo Credentials:</h1>
        <div class="text-center pt-6 pb-6 bg-[#f8fafcFF]">
          <p>Username: admin</p>
          <p>Password: admin123</p>
        </div>

      </div>

    </div>

  </main>

  <script src="script.js"></script>
  <script src="login.js"></script>

</body>

</html>
