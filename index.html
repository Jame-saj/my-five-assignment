<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Github Issues Tracker</title>
<!-- font -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
 <!-- font awesome -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css"
    integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw=="
    crossorigin="anonymous" referrerpolicy="no-referrer" />
  <!-- tailwind & daisy -->
  <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
  <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>

  <style>
    *{
       font-family: "Geist", sans-serif;
    }
  </style>



</head>
<body class=" ">
  <main>
   <div class="border">
    <div class="logo pt-48  mx-auto text-center items-center">
      <img src="./assets/github-logo.png" class="mx-auto mb-4" alt="">
      <h1 class="font-bold text-2xl">GitHub Issues Tracker</h1>
      <p class="text-gray-400 text-[18px]">Sign in to manage your issues</p>
    </div>
    <div class="form pt-6">
      <div class="card  w-full max-w-sm shrink-0 shadow-sm  mx-auto rounded-2xl">
        <div class="card-body">
          <fieldset class="fieldset">
            <label class="label font-bold text-[16px]">Username</label>
            <input id="user-name" type="" class="input rounded-2xl w-full outline-none   bg-base-300 "
              value="admin" placeholder="Enter username" />
            <label class="label font-bold text-[16px]">Password</label>
            <input id="input-pass" type="password" class="input outline-none w-full rounded-2xl  bg-base-300 " value="admin123"
              placeholder="Enter password" />
            <!-- <div><a class="link link-hover">Forgot password?</a></div> -->
            <button id="sign-btn" class="btn btn-primary mt-4 rounded-2xl">Sign In</button>
          </fieldset>
        </div>
      </div>
    </div>
   </div>
  


  </main>
</body>

<script src="script.js"></script>
</html>
